services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./resources:/app/resources:ro
      - ./config:/app/config:ro
    environment:
      - LIVENESS_API__WORKERS=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
