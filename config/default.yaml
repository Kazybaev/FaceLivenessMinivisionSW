# Face Liveness Detection — Configuration
# All hardcoded values from 5+ source files collected here.

detector:
  retinaface:
    confidence_threshold: 0.6
    input_size: 192  # resize shorter side
    prototxt: "resources/detection_model/deploy.prototxt"
    caffemodel: "resources/detection_model/Widerface-RetinaFace.caffemodel"
  mediapipe:
    min_face_detection_confidence: 0.5
    min_face_presence_confidence: 0.5
    min_tracking_confidence: 0.5
    num_faces: 1

analyzer:
  heuristic:
    # Blink detection
    blinks_needed: 3
    ear_threshold: 0.22
    min_blink_frames: 2
    # Head movement
    moves_needed: 10
    move_pixels: 16
    move_max_jump: 35
    smooth_window: 6
    # Nose/Eye ratio
    ratio_diff_min: 0.25
    ratio_checks_min: 6
    # Skin texture
    texture_min: 90.0
    texture_frames: 20
    # Landmark indices
    left_eye: [362, 385, 387, 263, 373, 380]
    right_eye: [33, 160, 158, 133, 153, 144]
    nose_tip: 1
    left_corner: 263
    right_corner: 33

  deep_learning:
    model_dir: "resources/anti_spoof_models"
    confidence_threshold: 0.6
    smoothing_frames: 10
    num_classes: 3

  combined:
    dl_weight: 0.6
    heuristic_weight: 0.4

training:
  lr: 0.1
  milestones: [10, 15, 22]
  gamma: 0.1
  epochs: 25
  momentum: 0.9
  weight_decay: 0.0005
  batch_size: 1024
  num_classes: 3
  input_channel: 3
  embedding_size: 128
  train_root_path: "./datasets/rgb_image"
  snapshot_dir_path: "./saved_logs/snapshot"
  log_path: "./saved_logs/jobs"
  board_loss_every: 10
  save_every: 30
  num_workers: 16
  cls_loss_weight: 0.5
  ft_loss_weight: 0.5

api:
  host: "0.0.0.0"
  port: 8000
  workers: 1
  cors_origins: ["*"]
  max_upload_size: 10485760  # 10MB
